<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>django-loginout-panel demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      padding: 3rem 3.5rem;
      border-radius: 18px;
      background: #1e293b;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .status {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 0 0 0.4rem;
    }
    .in .status { color: #4ade80; }
    .out .status { color: #94a3b8; }
    .who { font-size: 1.1rem; color: #cbd5e1; margin: 0; }
    .hint {
      margin-top: 1.6rem;
      font-size: 0.95rem;
      color: #64748b;
    }
    .dot {
      display: inline-block;
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    .in .dot { background: #4ade80; box-shadow: 0 0 12px #4ade80; }
    .out .dot { background: #64748b; }
  </style>
</head>
<body>
  <div class="card {% if user.is_authenticated %}in{% else %}out{% endif %}">
    {% if user.is_authenticated %}
      <p class="status"><span class="dot"></span>Logged in</p>
      <p class="who">You are authenticated as <strong>{{ user.get_username }}</strong>.</p>
    {% else %}
      <p class="status"><span class="dot"></span>Logged out</p>
      <p class="who">You are browsing anonymously.</p>
    {% endif %}
    <p class="hint">Use the <strong>Login / out</strong> panel in the debug toolbar &rarr;</p>
  </div>
</body>
</html>
