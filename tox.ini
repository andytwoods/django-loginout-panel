[tox]
isolated_build = True
envlist =
    py{312,313,314}-django52
    py{312,313,314}-django60

[gh-actions]
python =
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
deps =
    pytest
    pytest-django
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<6.1
    django-debug-toolbar>=6.0
commands = python -m pytest {posargs:tests}
