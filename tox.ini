[tox]
isolated_build = True
envlist =
    py{38,39,310}-django32
    py{38,39,310,311,312}-django42
    py{310,311,312}-django50

[gh-actions]
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312

[testenv]
deps =
    pytest
    pytest-django
    django32: Django>=3.2,<3.3
    django42: Django>=4.2,<4.3
    django50: Django>=5.0,<5.1
    django32: django-debug-toolbar>=3.2,<4
    django{42,50}: django-debug-toolbar>=4.2
commands = python -m pytest {posargs:tests}
